# ─── Reglas personalizadas ModSecurity ───────────────────────────────────────
# Archivo: /etc/modsecurity.d/custom-rules.conf

# Bloquear User-Agents maliciosos conocidos
SecRule REQUEST_HEADERS:User-Agent "@pmFromFile /etc/modsecurity.d/bad-user-agents.data" \
  "id:1000,phase:1,deny,status:403,msg:'Bad User-Agent blocked'"

# Protección extra: limitar tamaño del body (10MB)
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 1048576

# Bloquear intentos de path traversal
SecRule REQUEST_URI "@contains ../" \
  "id:1001,phase:1,deny,status:403,msg:'Path traversal attempt'"

# Log de todas las peticiones bloqueadas
SecAuditLog /var/log/modsec_audit.log
SecAuditLogParts ABIJDEFHZ
SecAuditEngine RelevantOnly
