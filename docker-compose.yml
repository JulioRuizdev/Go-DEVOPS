version: "3.9"

networks:
  frontend:      # WAF → Kong
  backend:       # Kong → Microservicios
  db-network:    # Microservicios → Bases de datos
  kong-internal: # Kong + Konga admin

volumes:
  postgres_data:
  redis_data:
  kong_prefix_vol:

# ─────────────────────────────────────────────
# BASE DE DATOS PRINCIPAL (PostgreSQL)
# ─────────────────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_MULTIPLE_DATABASES: kong,app_users,app_products,app_orders,app_files
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - db-network
      - kong-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache / Rate-limit store
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    networks:
      - db-network
      - kong-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

# ─────────────────────────────────────────────
# KONG - Migrations
# ─────────────────────────────────────────────
  kong-migrations:
    image: kong:3.6-ubuntu
    container_name: kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_DB: kong
      KONG_PG_USER: ${POSTGRES_USER:-admin}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    networks:
      - kong-internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

# ─────────────────────────────────────────────
# KONG API GATEWAY
# ─────────────────────────────────────────────
  kong:
    image: kong:3.6-ubuntu
    container_name: kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_DB: kong
      KONG_PG_USER: ${POSTGRES_USER:-admin}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      # Plugins habilitados
      KONG_PLUGINS: bundled,rate-limiting,redis-store
    ports:
      - "8000:8000"   # Proxy (tráfico API) — expuesto solo internamente al WAF
      - "8001:8001"   # Admin API (NO exponer en producción)
    networks:
      - frontend
      - backend
      - kong-internal
      - db-network
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5

# ─────────────────────────────────────────────
# KONGA - Dashboard visual para Kong
# ─────────────────────────────────────────────
  konga:
    image: pantsel/konga:latest
    container_name: konga
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_ADAPTER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      DB_DATABASE: kong
    ports:
      - "1337:1337"   # UI de Konga
    networks:
      - kong-internal
    depends_on:
      - kong
      - postgres

# ─────────────────────────────────────────────
# WAF - ModSecurity + NGINX (OWASP CRS)
# ─────────────────────────────────────────────
  waf:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: waf
    restart: unless-stopped
    environment:
      BACKEND: http://kong:8000          # Tráfico va a Kong
      PORT: 80
      MODSEC_RULE_ENGINE: "On"
      ANOMALY_INBOUND: 5                 # Score máximo antes de bloquear
      ANOMALY_OUTBOUND: 4
      PARANOIA: 1                        # Nivel 1-4 (1=menos falsos positivos)
      ALLOWED_METHODS: "GET POST PUT PATCH DELETE OPTIONS"
    volumes:
      - ./waf/custom-rules.conf:/etc/modsecurity.d/custom-rules.conf:ro
      - ./waf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    depends_on:
      kong:
        condition: service_healthy

# ─────────────────────────────────────────────
# MICROSERVICIOS
# ─────────────────────────────────────────────
  api-users:
    build:
      context: ./services/api-users
      dockerfile: Dockerfile
    container_name: api-users
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/app_users
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme}
    networks:
      - backend
      - db-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      retries: 3

  api-products:
    build:
      context: ./services/api-products
      dockerfile: Dockerfile
    container_name: api-products
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/app_products
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    networks:
      - backend
      - db-network
    depends_on:
      postgres:
        condition: service_healthy

  api-orders:
    build:
      context: ./services/api-orders
      dockerfile: Dockerfile
    container_name: api-orders
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/app_orders
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    networks:
      - backend
      - db-network
    depends_on:
      postgres:
        condition: service_healthy

# ─────────────────────────────────────────────
# MICROSERVICIO DE ARCHIVOS (S3)
# ─────────────────────────────────────────────
  api-files:
    build:
      context: ./services/api-files
      dockerfile: Dockerfile
    container_name: api-files
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/app_files
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      # AWS S3
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      SIGNED_URL_EXPIRES_SECONDS: ${SIGNED_URL_EXPIRES_SECONDS:-3600}
    networks:
      - backend
      - db-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 15s
      retries: 3

# ─────────────────────────────────────────────
# MONITORING - Prometheus + Grafana
# ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - kong-internal
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    networks:
      - kong-internal
    depends_on:
      - prometheus
